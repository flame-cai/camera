<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AIMM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b;--surface:#141416;--surface2:#1e1e22;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#ededf0;--text2:#888892;--text3:#44444e;
  --accent:#4f8fff;--accent-dim:rgba(79,143,255,.14);
  --green:#34d399;--green-dim:rgba(52,211,153,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,.10);
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f1f1ee;--surface:#fff;--surface2:#e6e6e2;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);
  --text:#111114;--text2:#66666e;--text3:#9999a4;
  --accent:#1a6af0;--accent-dim:rgba(26,106,240,.10);
  --green:#059669;--green-dim:rgba(5,150,105,.10);
  --red:#dc2626;--red-dim:rgba(220,38,38,.08);
  --amber:#b45309;--amber-dim:rgba(180,83,9,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;color:var(--text);
  font-family:var(--font);
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
  overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
}

/* ── Desktop wall ── */
#dwall{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#06060a;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:40px;
}
#dwall .dw-logo{font-family:var(--mono);font-size:1.8rem;letter-spacing:.25em;color:#4f8fff}
#dwall p{color:#444;font-size:.88rem;max-width:300px;line-height:1.65}
@media(min-width:1024px){#dwall{display:flex}#app{display:none!important}}

/* ── App shell ── */
#app{position:fixed;inset:0;background:#000;overflow:hidden}

/* ── Camera ── */
#cam-wrap{position:absolute;inset:0;overflow:hidden;background:#000}
#video{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:100%;
  object-fit:cover;display:block;
}
/* Canvas sits exactly on top of video */
#pose-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:2;
}

/* ── Border ring ── */
#cam-ring{
  position:absolute;inset:0;pointer-events:none;z-index:6;
}
#cam-ring::after{
  content:'';position:absolute;inset:0;
  border:3px solid transparent;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease);
  pointer-events:none;
}
#cam-ring.ready::after{border-color:var(--green);box-shadow:inset 0 0 28px rgba(52,211,153,.09)}
#cam-ring.blocked::after{border-color:var(--red);box-shadow:inset 0 0 28px rgba(248,113,113,.08)}
#cam-ring.warn::after{border-color:var(--amber);box-shadow:inset 0 0 28px rgba(251,191,36,.07)}

/* ── Silhouette ── */
#sil-wrap{
  position:absolute;inset:0;z-index:3;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#sil-wrap svg{height:88%;width:auto}

/* ── Top bar ── */
.topbar{
  position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:max(env(safe-area-inset-top,0px),12px) 16px 10px;
  background:linear-gradient(to bottom,rgba(9,9,11,.82) 0%,transparent 100%);
}
[data-theme="light"] .topbar{background:linear-gradient(to bottom,rgba(241,241,238,.88) 0%,transparent 100%)}
.tb-logo{font-family:var(--mono);font-size:.85rem;font-weight:500;letter-spacing:.24em;color:var(--text2)}
.tb-right{display:flex;gap:8px;align-items:center}

.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border2);
  background:rgba(14,14,17,.72);
  backdrop-filter:blur(10px);
  color:var(--text2);font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s var(--ease);
}
[data-theme="light"] .icon-btn{background:rgba(255,255,255,.82)}
.icon-btn:active{transform:scale(.88)}

.mode-pill{
  display:flex;align-items:center;
  background:rgba(14,14,17,.75);border:1px solid var(--border2);
  border-radius:100px;padding:3px;
  backdrop-filter:blur(10px);gap:2px;
}
[data-theme="light"] .mode-pill{background:rgba(255,255,255,.85)}
.mpb{
  padding:4px 11px;border-radius:100px;
  font-family:var(--mono);font-size:.6rem;font-weight:500;letter-spacing:.06em;
  cursor:pointer;border:none;background:transparent;color:var(--text3);
  transition:all .15s var(--ease);
}
.mpb.on{background:var(--accent);color:#fff}

/* ── Phase flash ── */
#phase-flash{
  position:absolute;inset:0;z-index:25;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;text-align:center;
  background:rgba(9,9,11,.82);
  backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity .25s var(--ease);
}
[data-theme="light"] #phase-flash{background:rgba(241,241,238,.85)}
#phase-flash.show{opacity:1;pointer-events:all}
.pf-num{font-family:var(--mono);font-size:.65rem;letter-spacing:.18em;color:var(--text3)}
.pf-title{font-size:2rem;font-weight:700;line-height:1.1;color:var(--text)}
.pf-sub{font-family:var(--mono);font-size:.7rem;letter-spacing:.04em;color:var(--text2)}
.pf-tap{
  margin-top:16px;padding:12px 28px;
  border-radius:10px;background:var(--accent);color:#fff;
  border:none;font-family:var(--font);font-size:.9rem;font-weight:600;
  cursor:pointer;
}
.pf-tap:active{opacity:.85}

/* ── Chips ── */
#chips-row{
  position:absolute;left:0;right:0;
  z-index:20;
  display:flex;gap:5px;align-items:center;justify-content:center;
  flex-wrap:nowrap;overflow:hidden;
  pointer-events:none;
  bottom:calc(max(env(safe-area-inset-bottom,0px),16px) + 108px);
  padding:0 12px;
}
.chip{
  display:flex;align-items:center;gap:5px;
  background:rgba(14,14,17,.78);border:1px solid var(--border2);
  border-radius:100px;padding:5px 9px;
  backdrop-filter:blur(8px);
  transition:all .18s var(--ease);
  flex-shrink:0;
}
[data-theme="light"] .chip{background:rgba(255,255,255,.84)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .18s;flex-shrink:0}
.chip-lbl{font-family:var(--mono);font-size:.57rem;font-weight:500;letter-spacing:.05em;color:var(--text3);transition:color .18s}
.chip.ok{border-color:rgba(52,211,153,.28);background:rgba(52,211,153,.07)}
.chip.ok .chip-dot{background:var(--green)}
.chip.ok .chip-lbl{color:var(--green)}
.chip.bad{border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.07)}
.chip.bad .chip-dot{background:var(--red)}
.chip.bad .chip-lbl{color:var(--red)}
.chip.wrn{border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.07)}
.chip.wrn .chip-dot{background:var(--amber)}
.chip.wrn .chip-lbl{color:var(--amber)}

/* ── Guidance ── */
#guidance{
  position:absolute;left:0;right:0;
  z-index:20;
  bottom:calc(max(env(safe-area-inset-bottom,0px),16px) + 88px);
  font-family:var(--mono);font-size:.68rem;letter-spacing:.04em;
  color:rgba(255,255,255,.45);
  text-align:center;
  pointer-events:none;
  transition:color .2s var(--ease);
  padding:0 16px;
}
[data-theme="light"] #guidance{color:var(--text2)}

/* ── Shutter zone ── */
#shutter-zone{
  position:absolute;bottom:0;left:0;right:0;z-index:22;
  display:flex;align-items:center;justify-content:center;
  padding-top:12px;
  padding-bottom:calc(max(env(safe-area-inset-bottom,0px),16px) + 10px);
  background:linear-gradient(to top,rgba(9,9,11,.9) 0%,transparent 100%);
  pointer-events:none;
}
[data-theme="light"] #shutter-zone{background:linear-gradient(to top,rgba(241,241,238,.94) 0%,transparent 100%)}

#shutter{
  width:78px;height:78px;border-radius:50%;
  background:transparent;
  border:3px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;
  position:relative;
  transition:border-color .22s var(--ease),opacity .22s;
}
#shutter::after{
  content:'';width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.17);
  transition:background .22s var(--ease),transform .1s;
}
#shutter:active::after{transform:scale(.88)}
#shutter.ready{border-color:var(--green)}
#shutter.ready::after{background:var(--green)}
#shutter.off{opacity:.35;pointer-events:none}

/* ── Flash ── */
#flash{position:absolute;inset:0;z-index:60;background:#fff;opacity:0;pointer-events:none;transition:opacity .06s}
#flash.on{opacity:.88}

/* ── Capture popup ── */
#capture-popup{
  position:absolute;inset:0;z-index:70;
  background:rgba(9,9,11,.94);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:0;
  opacity:0;pointer-events:none;
  transition:opacity .22s var(--ease);
}
[data-theme="light"] #capture-popup{background:rgba(241,241,238,.95)}
#capture-popup.show{opacity:1;pointer-events:all}

.cp-label{
  font-family:var(--mono);font-size:.65rem;letter-spacing:.14em;color:var(--text3);
  flex-shrink:0;
}

/* 90% of viewport — both axes */
.cp-img-wrap{
  width:90vw;
  height:90vh;
  max-width:calc(90vh * 3/4); /* keep 3:4 aspect, width-constrained by height */
  border-radius:14px;overflow:hidden;
  border:1px solid var(--border2);background:#000;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
  flex-shrink:0;
}
.cp-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}

.cp-btns{
  display:flex;gap:12px;
  width:90vw;
  max-width:calc(90vh * 3/4);
  flex-shrink:0;
}
.cp-btn{
  flex:1;padding:14px 0;border-radius:10px;
  border:1px solid var(--border2);
  font-family:var(--font);font-size:.9rem;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .15s var(--ease);
}
.cp-btn:active{transform:scale(.97)}
.cp-retake{background:var(--surface2);color:var(--text2)}
.cp-next{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Upload overlay ── */
#upload-over{
  position:absolute;inset:0;z-index:80;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:22px;text-align:center;padding:32px;
  opacity:0;pointer-events:none;
  transition:opacity .25s var(--ease);
}
#upload-over.show{opacity:1;pointer-events:all}
.spin-ring{
  width:58px;height:58px;border-radius:50%;
  border:2px solid var(--surface2);border-top-color:var(--accent);
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.up-title{font-size:1.1rem;font-weight:600;color:var(--text)}
.up-sub{font-family:var(--mono);font-size:.7rem;color:var(--text2);letter-spacing:.04em}
.up-prog{width:160px;height:2px;background:var(--surface2);border-radius:1px;overflow:hidden}
.up-prog-fill{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width .4s var(--ease)}
.suc-ico{
  width:68px;height:68px;border-radius:50%;
  background:var(--green-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:var(--green);
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.err-ico{
  width:68px;height:68px;border-radius:50%;
  background:var(--red-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:var(--red);
}
.up-btn{
  padding:13px 36px;border-radius:10px;
  font-family:var(--font);font-size:.9rem;font-weight:600;
  cursor:pointer;border:none;transition:opacity .15s;
}
.up-btn:active{opacity:.8}
.up-btn-p{background:var(--accent);color:#fff}
.up-btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}

/* ── Loading ── */
#loading{
  position:absolute;inset:0;z-index:100;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:22px;
  transition:opacity .4s var(--ease);
}
#loading.out{opacity:0;pointer-events:none}
.ld-logo{font-family:var(--mono);font-size:1.5rem;font-weight:500;letter-spacing:.28em;color:var(--accent)}
.ld-bar{width:140px;height:2px;background:var(--surface2);border-radius:1px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width .35s var(--ease)}
.ld-lbl{font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:.1em}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- Desktop wall -->
<div id="dwall">
  <div class="dw-logo">AIMM</div>
  <p>This app is designed for mobile devices only.<br>Please open it on your smartphone or tablet.</p>
</div>

<div id="app">

  <!-- Camera layer -->
  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="pose-canvas"></canvas>
    <div id="cam-ring" class="blocked"></div>
    <div id="sil-wrap"></div>
  </div>

  <!-- Phase flash (shown at start of each phase) -->
  <div id="phase-flash">
    <div class="pf-num" id="pf-num"></div>
    <div class="pf-title" id="pf-title"></div>
    <div class="pf-sub" id="pf-sub"></div>
    <button class="pf-tap" id="pf-tap">Got it →</button>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <span class="tb-logo">AIMM</span>
    <div class="tb-right">
      <div class="mode-pill">
        <button class="mpb on" id="btn-block">BLOCK</button>
        <button class="mpb" id="btn-warn">WARN</button>
      </div>
      <button class="icon-btn" id="btn-theme">◑</button>
    </div>
  </div>

  <!-- Status chips -->
  <div id="chips-row">
    <div class="chip" id="c-tilt"><div class="chip-dot"></div><span class="chip-lbl">LEVEL</span></div>
    <div class="chip" id="c-shake"><div class="chip-dot"></div><span class="chip-lbl">STEADY</span></div>
    <div class="chip" id="c-light"><div class="chip-dot"></div><span class="chip-lbl">LIGHT</span></div>
    <div class="chip" id="c-body"><div class="chip-dot"></div><span class="chip-lbl">BODY</span></div>
    <div class="chip" id="c-pose"><div class="chip-dot"></div><span class="chip-lbl">POSE</span></div>
  </div>

  <!-- Guidance -->
  <div id="guidance">Initialising…</div>

  <!-- Shutter -->
  <div id="shutter-zone">
    <button id="shutter" class="off" aria-label="Capture"></button>
  </div>

  <!-- Flash -->
  <div id="flash"></div>

  <!-- Capture popup -->
  <div id="capture-popup">
    <div class="cp-label" id="cp-label"></div>
    <div class="cp-img-wrap"><img id="cp-img" src="" alt="Preview"></div>
    <div class="cp-btns">
      <button class="cp-btn cp-retake" id="btn-retake">↩ Retake</button>
      <button class="cp-btn cp-next" id="btn-next">Next →</button>
    </div>
  </div>

  <!-- Upload overlay -->
  <div id="upload-over">
    <div id="up-uploading" style="display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="spin-ring"></div>
      <div class="up-title">Uploading</div>
      <div class="up-sub" id="up-sub">Sending front photo…</div>
      <div class="up-prog"><div class="up-prog-fill" id="up-bar"></div></div>
    </div>
    <div id="up-success" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:16px">
      <div class="suc-ico">✓</div>
      <div class="up-title">Upload Complete</div>
      <div class="up-sub">Both photos sent successfully.</div>
      <button class="up-btn up-btn-p" id="btn-new">New Session →</button>
    </div>
    <div id="up-error" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div class="err-ico">✕</div>
      <div class="up-title">Upload Failed</div>
      <div class="up-sub" id="up-errmsg"></div>
      <button class="up-btn up-btn-p" id="btn-retry">Retry</button>
      <button class="up-btn up-btn-s" id="btn-restart">Start Over</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="ld-logo">AIMM</div>
    <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
    <div class="ld-lbl" id="ld-lbl">LOADING…</div>
  </div>

</div>

<!-- MediaPipe from skypack (matches official demo) -->
<script type="module">
import {
  PoseLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.0";

(function(){
'use strict';

// ── Theme ─────────────────────────────────────────────
const savedTh = localStorage.getItem('aimm-theme');
let dark = savedTh ? savedTh==='dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
function applyTh(){
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  localStorage.setItem('aimm-theme', dark?'dark':'light');
}
applyTh();
document.getElementById('btn-theme').addEventListener('click',()=>{dark=!dark;applyTh();});

// ── Block / Warn mode ─────────────────────────────────
let blockMode = true;
document.getElementById('btn-block').addEventListener('click',()=>{
  blockMode=true;
  document.getElementById('btn-block').classList.add('on');
  document.getElementById('btn-warn').classList.remove('on');
});
document.getElementById('btn-warn').addEventListener('click',()=>{
  blockMode=false;
  document.getElementById('btn-warn').classList.add('on');
  document.getElementById('btn-block').classList.remove('on');
});

// ── State ─────────────────────────────────────────────
let phase = 'front';
let frontBlob = null, sideBlob = null;
let stream = null;
let poseLandmarker = null;
let drawingUtils = null;
let webcamRunning = false;
let lastVideoTime = -1;
let uploadPending = false;
let checks = {tilt:false,shake:false,light:false,body:false,pose:false};

// ── Elements ──────────────────────────────────────────
const video         = document.getElementById('video');
const pCvs          = document.getElementById('pose-canvas');
const pCtx          = pCvs.getContext('2d');
const camRing       = document.getElementById('cam-ring');
const shutterBtn    = document.getElementById('shutter');
const guidanceEl    = document.getElementById('guidance');
const capturePopup  = document.getElementById('capture-popup');
const cpImg         = document.getElementById('cp-img');
const cpLabel       = document.getElementById('cp-label');
const uploadOver    = document.getElementById('upload-over');
const loadEl        = document.getElementById('loading');
const ldFill        = document.getElementById('ld-fill');
const ldLbl         = document.getElementById('ld-lbl');
const flashEl       = document.getElementById('flash');
const silWrap       = document.getElementById('sil-wrap');
const phaseFlash    = document.getElementById('phase-flash');

// ── Loader ────────────────────────────────────────────
function ldProg(pct,lbl){
  ldFill.style.width = pct+'%';
  ldLbl.textContent = lbl;
}
function hideLoader(){
  loadEl.classList.add('out');
  setTimeout(()=>{ loadEl.style.display='none'; }, 500);
}

// ── Init MediaPipe ────────────────────────────────────
async function initMP(){
  ldProg(15,'LOADING VISION…');
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm'
    );
    ldProg(50,'BUILDING DETECTOR…');
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numPoses: 3,
      minPoseDetectionConfidence: 0.45,
      minPosePresenceConfidence: 0.45,
      minTrackingConfidence: 0.45
    });
    ldProg(80,'STARTING CAMERA…');
    await startCam();
    ldProg(100,'READY');
    hideLoader();
    showPhaseFlash();
  } catch(e) {
    console.warn('MediaPipe failed:', e);
    ldProg(100,'ML UNAVAILABLE — LIMITED MODE');
    await startCam();
    // Without pose detection, mark pose+body as ok so user can still shoot
    checks.body = true; checks.pose = true;
    hideLoader();
    showPhaseFlash();
  }
}

// ── Camera ────────────────────────────────────────────
async function startCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  webcamRunning = false;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1440}, height:{ideal:1920} },
      audio:false
    });
    video.srcObject = stream;
    video.addEventListener('loadeddata', ()=>{
      webcamRunning = true;
      // Init DrawingUtils once canvas is known
      drawingUtils = new DrawingUtils(pCtx);
      predictWebcam();
    }, {once:true});
    await video.play();
  } catch(e) {
    guidanceEl.textContent = 'Camera access required — check permissions';
    console.error(e);
  }
}

// ── Webcam prediction loop (official pattern) ─────────
function predictWebcam(){
  if(!webcamRunning) return;

  // Sync canvas to display size
  const rect = video.getBoundingClientRect();
  if(pCvs.width !== rect.width || pCvs.height !== rect.height){
    pCvs.width  = rect.width  || video.videoWidth;
    pCvs.height = rect.height || video.videoHeight;
  }

  pCtx.save();
  pCtx.clearRect(0,0,pCvs.width,pCvs.height);

  // Brightness sample
  sampleBrightness();

  if(poseLandmarker && video.currentTime !== lastVideoTime){
    lastVideoTime = video.currentTime;
    poseLandmarker.detectForVideo(video, performance.now(), (result)=>{
      if(result.landmarks && result.landmarks.length > 0){
        // Find center person
        let ci=0, md=999;
        result.landmarks.forEach((lm,i)=>{
          const n=lm[0]; if(!n) return;
          const d=Math.abs(n.x-.5);
          if(d<md){md=d;ci=i;}
        });
        const lm = result.landmarks[ci];

        // Draw skeleton via official DrawingUtils
        drawingUtils.drawLandmarks(lm, {
          radius: (data)=> DrawingUtils.lerp(data.from ? data.from.z : 0, -0.15, 0.1, 6, 2),
          color: 'rgba(79,143,255,0.85)',
          fillColor: 'rgba(79,143,255,0.6)',
          lineWidth: 2
        });
        drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, {
          color: 'rgba(79,143,255,0.5)',
          lineWidth: Math.max(1.5, pCvs.width * 0.003)
        });

        checks.body = fullBodyVisible(lm);
        checks.pose = phase==='front' ? checkTpose(lm) : checkSide(lm);
      } else {
        checks.body = false;
        checks.pose = false;
      }
      updateUI();
    });
  } else if(!poseLandmarker){
    updateUI();
  }

  pCtx.restore();
  window.requestAnimationFrame(predictWebcam);
}

// ── Brightness ────────────────────────────────────────
const bCvs = document.createElement('canvas'); bCvs.width=32; bCvs.height=32;
const bCtx = bCvs.getContext('2d',{willReadFrequently:true});
function sampleBrightness(){
  if(!video.videoWidth) return;
  bCtx.drawImage(video,0,0,32,32);
  const d = bCtx.getImageData(0,0,32,32).data;
  let s=0;
  for(let i=0;i<d.length;i+=4) s += d[i]*.299+d[i+1]*.587+d[i+2]*.114;
  checks.light = (s/(32*32)) > 52;
}

// ── Gyroscope ─────────────────────────────────────────
function handleOri(e){
  const b=e.beta||0, g=e.gamma||0;
  checks.tilt = Math.abs(b-90)<15 && Math.abs(g)<13;
}
if(typeof DeviceOrientationEvent !== 'undefined'){
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    // iOS 13+
    document.addEventListener('touchstart', async function rp(){
      try{
        const r = await DeviceOrientationEvent.requestPermission();
        if(r==='granted') window.addEventListener('deviceorientation', handleOri);
      }catch(e){}
      document.removeEventListener('touchstart', rp);
    },{once:true});
  } else {
    window.addEventListener('deviceorientation', handleOri);
  }
} else { checks.tilt = true; }

// ── Accelerometer ─────────────────────────────────────
let lastA={x:0,y:0,z:0}, shakeOk=true, shakeTmr=null;
function handleMotion(e){
  const a=e.accelerationIncludingGravity; if(!a){checks.shake=true;return;}
  const dx=Math.abs(a.x-lastA.x),dy=Math.abs(a.y-lastA.y),dz=Math.abs(a.z-lastA.z);
  lastA={x:a.x,y:a.y,z:a.z};
  const rms=Math.sqrt(dx*dx+dy*dy+dz*dz);
  if(rms>2.8){ shakeOk=false; clearTimeout(shakeTmr); shakeTmr=setTimeout(()=>{shakeOk=true;},550); }
  checks.shake = shakeOk;
}
if(typeof DeviceMotionEvent !== 'undefined'){
  if(typeof DeviceMotionEvent.requestPermission === 'function'){
    document.addEventListener('touchstart', async function rm(){
      try{
        const r = await DeviceMotionEvent.requestPermission();
        if(r==='granted') window.addEventListener('devicemotion', handleMotion);
      }catch(e){}
      document.removeEventListener('touchstart', rm);
    },{once:true});
  } else {
    window.addEventListener('devicemotion', handleMotion);
  }
} else { checks.shake = true; }

// ── Pose checks ───────────────────────────────────────
function vis(lm,i,t=.4){ return lm[i] && lm[i].visibility > t; }

function fullBodyVisible(lm){
  const nose=lm[0];
  if(!nose || nose.visibility<.5) return false;
  if(nose.y > .28) return false;
  const la=lm[27], ra=lm[28], lh=lm[29], rh=lm[30];
  const ankL = (la&&la.visibility>.3) ? la : lh;
  const ankR = (ra&&ra.visibility>.3) ? ra : rh;
  if(!ankL && !ankR) return false;
  const ankY = Math.max(ankL?ankL.y:0, ankR?ankR.y:0);
  return ankY > .72;
}

function checkTpose(lm){
  const need=[11,12,13,14,15,16,23,24];
  if(!need.every(i=>vis(lm,i,.45))) return false;
  const ls=lm[11],rs=lm[12],le=lm[13],re=lm[14],lw=lm[15],rw=lm[16];
  const sy=(ls.y+rs.y)/2;
  const sSpan=Math.abs(rs.x-ls.x);
  if(sSpan<.18) return false;             // not front-facing enough
  if(Math.abs(lw.y-sy)>.13) return false; // left wrist height
  if(Math.abs(rw.y-sy)>.13) return false; // right wrist height
  if(Math.abs(le.y-sy)>.13) return false; // left elbow height
  if(Math.abs(re.y-sy)>.13) return false; // right elbow height
  if(lw.x > ls.x+.04) return false;       // left wrist must be left of left shoulder
  if(rw.x < rs.x-.04) return false;       // right wrist must be right of right shoulder
  return true;
}

function checkSide(lm){
  const need=[11,12,13,14,15,16,23,24];
  if(!need.every(i=>vis(lm,i,.38))) return false;
  const ls=lm[11],rs=lm[12],lw=lm[15],rw=lm[16],lh=lm[23],rh=lm[24];
  const sSpan=Math.abs(rs.x-ls.x);
  if(sSpan>.23) return false;             // too face-on
  const sy=(ls.y+rs.y)/2, hy=(lh.y+rh.y)/2;
  const bH=hy-sy; if(bH<.06) return false;
  const wOk=w=>w&&w.y>sy&&w.y<hy+bH*.6;
  if(!wOk(lw)&&!wOk(rw)) return false;   // arms not at sides
  const nose=lm[0];
  if(nose&&vis(lm,0,.4)){
    const cx=(ls.x+rs.x)/2;
    if(Math.abs(nose.x-cx)>.2) return false; // not upright
  }
  return true;
}

// ── UI update ─────────────────────────────────────────
const chipIds={tilt:'c-tilt',shake:'c-shake',light:'c-light',body:'c-body',pose:'c-pose'};
const msgs={
  tilt: {bad:'Level the phone',wrn:'Slightly tilted'},
  shake:{bad:'Hold steady',    wrn:'Movement detected'},
  light:{bad:'Too dark',       wrn:'Low light'},
  body: {bad:'Show full body', wrn:'Body partially cut off'},
  pose: {
    front:{bad:'Raise arms — T-pose', wrn:'Adjust arm position'},
    side: {bad:'Turn right side to camera', wrn:'Adjust side pose'}
  }
};

function updateUI(){
  const allOk = Object.values(checks).every(Boolean);
  const canShoot = blockMode ? allOk : true;

  // Ring
  camRing.className = allOk?'ready':(blockMode?'blocked':'warn');

  // Shutter
  shutterBtn.className = canShoot ? 'ready' : 'off';

  // Chips
  Object.keys(checks).forEach(k=>{
    const chip=document.getElementById(chipIds[k]);
    const ok=checks[k];
    chip.className='chip '+(ok?'ok':(blockMode?'bad':'wrn'));
  });

  // Guidance
  const fails=Object.keys(checks).filter(k=>!checks[k]);
  let msg = phase==='front'
    ? 'T-pose — both arms out, full body visible'
    : 'Right side to camera — stand straight, full body';
  if(fails.length){
    const k=fails[0];
    if(k==='pose'){
      msg = blockMode ? msgs.pose[phase].bad : msgs.pose[phase].wrn;
    } else {
      msg = blockMode ? msgs[k].bad : msgs[k].wrn;
    }
  }
  guidanceEl.textContent = msg;
  guidanceEl.style.color = allOk
    ? 'rgba(52,211,153,.9)'
    : (blockMode?'rgba(248,113,113,.8)':'rgba(251,191,36,.85)');
}

function setSil(){ silWrap.innerHTML = phase==='front' ? SIL_FRONT : SIL_SIDE; }

// ── Phase flash ───────────────────────────────────────
function showPhaseFlash(){
  document.getElementById('pf-num').textContent   = phase==='front'?'PHOTO 1 OF 2':'PHOTO 2 OF 2';
  document.getElementById('pf-title').innerHTML   = phase==='front'?'Front View<br>T-Pose':'Side View<br>Attention';
  document.getElementById('pf-sub').textContent   = phase==='front'
    ?'Stretch both arms fully out to the sides'
    :'Stand with right side facing camera';
  phaseFlash.classList.add('show');
  setSil();
}
document.getElementById('pf-tap').addEventListener('click',()=>{
  phaseFlash.classList.remove('show');
});

// ── Shutter ───────────────────────────────────────────
shutterBtn.addEventListener('click',()=>{
  if(shutterBtn.classList.contains('off')) return;
  doCapture();
});

function doCapture(){
  // Instant flash
  flashEl.classList.add('on');
  requestAnimationFrame(()=>requestAnimationFrame(()=>flashEl.classList.remove('on')));

  const W=1080, H=1440;
  const cap=document.createElement('canvas'); cap.width=W; cap.height=H;
  const ctx=cap.getContext('2d');
  const vw=video.videoWidth, vh=video.videoHeight;
  if(!vw||!vh) return;
  const tr=3/4, sr=vw/vh;
  let sx,sy,sw,sh;
  if(sr>tr){ sh=vh; sw=vh*tr; sx=(vw-sw)/2; sy=0; }
  else      { sw=vw; sh=vw/tr; sx=0; sy=(vh-sh)/2; }
  ctx.drawImage(video, sx,sy,sw,sh, 0,0,W,H);

  cap.toBlob(blob=>{
    if(!blob) return;
    blob._ts = genTs();
    if(phase==='front') frontBlob=blob; else sideBlob=blob;
    showPopup(cap.toDataURL('image/jpeg',.75));
  },'image/jpeg',.93);
}

function genTs(){
  const n=new Date();
  return n.getFullYear()+
    String(n.getMonth()+1).padStart(2,'0')+
    String(n.getDate()).padStart(2,'0')+'_'+
    String(n.getHours()).padStart(2,'0')+
    String(n.getMinutes()).padStart(2,'0')+
    String(n.getSeconds()).padStart(2,'0');
}

// ── Capture popup ─────────────────────────────────────
function showPopup(dataUrl){
  cpImg.src = dataUrl;
  cpLabel.textContent = phase==='front'?'FRONT VIEW — T-POSE':'SIDE VIEW — ATTENTION';
  capturePopup.classList.add('show');
}
function hidePopup(){ capturePopup.classList.remove('show'); }

document.getElementById('btn-retake').addEventListener('click',()=>{
  if(phase==='front') frontBlob=null; else sideBlob=null;
  hidePopup();
});

document.getElementById('btn-next').addEventListener('click',()=>{
  hidePopup();
  if(phase==='front'){
    phase='side';
    setSil();
    showPhaseFlash();
  } else {
    beginUpload();
  }
});

// ── Upload ────────────────────────────────────────────
const API = 'https://aimm-450300910281.asia-south1.run.app';

async function beginUpload(){
  if(uploadPending) return;
  uploadPending = true;
  showUpState('uploading');
  document.getElementById('up-bar').style.width='0%';
  try{
    const ts = (frontBlob&&frontBlob._ts) || genTs();
    document.getElementById('up-sub').textContent='Sending front photo…';
    document.getElementById('up-bar').style.width='15%';
    await sendFile(frontBlob, ts+'_front.jpg');
    document.getElementById('up-bar').style.width='60%';
    document.getElementById('up-sub').textContent='Sending side photo…';
    await sendFile(sideBlob, ts+'_side.jpg');
    document.getElementById('up-bar').style.width='100%';
    showUpState('success');
  }catch(e){
    document.getElementById('up-errmsg').textContent = e.message||'Network error. Please retry.';
    showUpState('error');
  }
}

function sendFile(blob,name){
  return new Promise((res,rej)=>{
    const fd=new FormData(); fd.append('file',blob,name);
    const xhr=new XMLHttpRequest();
    xhr.open('POST',API,true);
    xhr.onload = ()=> xhr.status>=200&&xhr.status<300 ? res() : rej(new Error('Server '+xhr.status));
    xhr.onerror = ()=> rej(new Error('Network error — check connection'));
    xhr.timeout = 60000;
    xhr.ontimeout = ()=> rej(new Error('Upload timed out'));
    xhr.send(fd);
  });
}

function showUpState(s){
  uploadOver.classList.add('show');
  const upEl  = document.getElementById('up-uploading');
  const sucEl = document.getElementById('up-success');
  const errEl = document.getElementById('up-error');
  upEl.style.display  = s==='uploading'?'flex':'none';
  sucEl.style.display = s==='success' ?'flex':'none';
  errEl.style.display = s==='error'   ?'flex':'none';
  sucEl.classList.toggle('hidden', s!=='success');
  errEl.classList.toggle('hidden', s!=='error');
}

document.getElementById('btn-retry').addEventListener('click',()=>{ uploadPending=false; beginUpload(); });
document.getElementById('btn-new').addEventListener('click', reset);
document.getElementById('btn-restart').addEventListener('click', reset);

function reset(){
  uploadPending=false; frontBlob=null; sideBlob=null; phase='front';
  uploadOver.classList.remove('show');
  ['up-uploading','up-success','up-error'].forEach(id=>{
    const el=document.getElementById(id); el.style.display='none';
  });
  document.getElementById('up-success').classList.add('hidden');
  document.getElementById('up-error').classList.add('hidden');
  document.getElementById('up-bar').style.width='0%';
  setSil(); showPhaseFlash();
}

  if(!mob && window.innerWidth>=1024){
    document.getElementById('dwall').style.display='flex';
    document.getElementById('app').style.display='none';
  }
}
