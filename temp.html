<!DOCTYPE html>
<html>
<head>
  <title>IAP Cloud Run Demo</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1 id="welcome">Please sign in</h1>
  <div id="g_id_signin"></div>

  <script>
    const apiUrl = "https://temp-450300910281.asia-south1.run.app/";

    window.onload = () => {
      google.accounts.id.initialize({
        client_id: "450300910281-c42g9vc3q8f27la48e2j5vc6428nk7sj.apps.googleusercontent.com",
        callback: handleCredentialResponse
      });

      google.accounts.id.renderButton(
        document.getElementById("g_id_signin"),
        { theme: "outline", size: "large" }
      );
    };

    async function handleCredentialResponse(response) {
      const idToken = response.credential;

      try {
        const res = await fetch(apiUrl, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + idToken
          },
          mode: 'cors',
          credentials: 'omit'
        });

        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        document.getElementById("welcome").innerText = `Hello, ${data.email}`;
      } catch (err) {
        console.error("Failed to fetch API:", err);
        document.getElementById("welcome").innerText = "Error fetching user info";
      }
    }
  </script>
</body>
</html>
