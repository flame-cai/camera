<!DOCTYPE html>
<html>
<head>
  <title>IAP Redirect Login Demo</title>
</head>
<body>
<h1>IAP Redirect Login Demo</h1>
<div id="status">Checking login...</div>

<script>
const CLOUD_RUN_URL = "https://temp-450300910281.asia-south1.run.app/";

const params = new URLSearchParams(window.location.search);
const iapToken = params.get("iap_token");

if (!iapToken) {
  // Not logged in → redirect to Cloud Run
  document.getElementById("status").innerText = "Redirecting to login...";
  window.location.href = CLOUD_RUN_URL;
} else {
  // Logged in → show token and decode payload
  document.getElementById("status").innerHTML = `
    <h2>✅ Logged in!</h2>
    <p><b>ID Token:</b></p>
    <textarea style="width:100%;height:150px;">${iapToken}</textarea>
  `;

  try {
    const payload = JSON.parse(atob(iapToken.split('.')[1]));
    const userInfoDiv = document.createElement("div");
    userInfoDiv.innerHTML = `
      <h3>User Info from ID Token:</h3>
      <pre>${JSON.stringify(payload, null, 2)}</pre>
    `;
    document.body.appendChild(userInfoDiv);
  } catch(e) {
    console.error("Failed to decode token:", e);
  }
}
</script>
</body>
</html>
