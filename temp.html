<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IAP Auth Example</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1 id="welcome">Loading...</h1>
  <div id="login"></div>

  <script>
    const IAP_CLIENT_ID = "450300910281-c42g9vc3q8f27la48e2j5vc6428nk7sj.apps.googleusercontent.com";
    const API_URL = "https://temp-450300910281.asia-south1.run.app/";

    // Render the Google sign-in button
    window.onload = function() {
      google.accounts.id.initialize({
        client_id: IAP_CLIENT_ID,
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.getElementById("login"),
        { theme: "outline", size: "large" }
      );
      google.accounts.id.prompt();
    };

    async function handleCredentialResponse(response) {
      const token = response.credential; // ID token
      console.log("ID token:", token);

      // Call Cloud Function with token
      try {
        const res = await fetch(API_URL, {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        if (!res.ok) throw new Error(res.statusText);

        const data = await res.json();
        document.getElementById("welcome").textContent = 
          `Hello, ${data.email || "user"}!`;
      } catch (err) {
        document.getElementById("welcome").textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
