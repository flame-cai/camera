<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IAP Frontend Demo</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    pre { background: #f0f0f0; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>IAP Frontend Demo</h1>
  <button id="loginBtn">Login with Google</button>
  <button id="callApiBtn" disabled>Call IAP API</button>

  <h2>Logs:</h2>
  <pre id="log"></pre>

  <script>
    const IAP_CLIENT_ID = "450300910281-c42g9vc3q8f27la48e2j5vc6428nk7sj.apps.googleusercontent.com";
    const IAP_URL = "https://temp-450300910281.asia-south1.run.app/";

    let token = null;

    function log(msg, obj=null) {
      const logEl = document.getElementById('log');
      if (obj) {
        logEl.textContent += msg + '\n' + JSON.stringify(obj, null, 2) + '\n\n';
      } else {
        logEl.textContent += msg + '\n\n';
      }
    }

    // Initialize Google Identity Services
    window.onload = () => {
      google.accounts.id.initialize({
        client_id: IAP_CLIENT_ID,
        callback: handleCredentialResponse
      });

      document.getElementById('loginBtn').onclick = () => {
        google.accounts.id.prompt(); // show login prompt
      };

      document.getElementById('callApiBtn').onclick = callIapApi;
    };

    function handleCredentialResponse(response) {
      token = response.credential; // This is the ID token
      log("✅ Logged in, ID Token received:", response);
      document.getElementById('callApiBtn').disabled = false;
    }

    async function callIapApi() {
      if (!token) {
        log("❌ No ID token, please login first.");
        return;
      }

      try {
        log(`➡️ Calling IAP API at ${IAP_URL} with token...`);
        const res = await fetch(IAP_URL, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        const text = await res.text();
        let body;
        try { body = JSON.parse(text); } catch { body = text; }
        log(`✅ Response (${res.status}):`, body);
      } catch (err) {
        log("❌ Fetch error:", err);
      }
    }
  </script>
</body>
</html>
