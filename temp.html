<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IAP Auth Example</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1>IAP + Cloud Run Example</h1>
  <div id="g_id_onload"
       data-client_id="450300910281-c42g9vc3q8f27la48e2j5vc6428nk7sj.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <pre id="output"></pre>

  <script>
    const API_URL = "https://temp-450300910281.asia-south1.run.app/";

    async function handleCredentialResponse(response) {
      const id_token = response.credential; // This is the ID token

      document.getElementById('output').textContent = "Calling API...";

      try {
        const res = await fetch(API_URL, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${id_token}`
          }
        });

        if (!res.ok) {
          throw new Error(`HTTP error ${res.status}`);
        }

        const data = await res.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('output').textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
